[tool.black]
line-length = 120
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | node_modules
  | dist
  | build
  | __pycache__
  | \.eggs
)/
'''

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["backend", "data", "models", "copilot", "scripts"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
skip_glob = ["node_modules/*", ".venv/*", "venv/*"]

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503"]
exclude = [".git", "__pycache__", "node_modules", "dist", "build", ".venv", "venv"]

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: |
          flake8 backend/ models/ data/ scripts/ \
            --max-line-length 120 \
            --extend-ignore E203,W503 \
            --count --show-source --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          if find tests/ -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No test files found — skipping pytest."
          fi

  train-and-validate:
    name: Train & Validate Artifacts
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python scripts/run_etl.py

      - name: Train models
        run: python scripts/train.py --env local

      - name: Validate artifacts exist
        run: |
          echo "Checking required artifacts..."
          test -f artifacts/models/primary_lightgbm.joblib \
            || { echo "FAIL: primary_lightgbm.joblib not found"; exit 1; }
          test -f artifacts/models/baseline_seasonal_naive.joblib \
            || { echo "FAIL: baseline_seasonal_naive.joblib not found"; exit 1; }
          test -f artifacts/models/model_metadata.json \
            || { echo "FAIL: model_metadata.json not found"; exit 1; }
          test -f artifacts/models/feature_columns.json \
            || { echo "FAIL: feature_columns.json not found"; exit 1; }
          test -f artifacts/models/metrics.json \
            || { echo "FAIL: metrics.json not found"; exit 1; }
          echo "All required artifacts present."

      - name: Validate model-feature consistency
        run: |
          python -c "
          import json, joblib, sys

          model = joblib.load('artifacts/models/primary_lightgbm.joblib')
          with open('artifacts/models/feature_columns.json') as f:
              feature_columns = json.load(f)

          model_features = set(model._model.feature_name_)
          saved_features = set(feature_columns)

          if model_features != saved_features:
              only_model = model_features - saved_features
              only_json = saved_features - model_features
              print('FAIL: model.feature_name_ does not match feature_columns.json')
              if only_model:
                  print(f'  In model only: {sorted(only_model)}')
              if only_json:
                  print(f'  In JSON only:  {sorted(only_json)}')
              sys.exit(1)

          print(f'Feature consistency verified: {len(saved_features)} features match.')
          "

  smoke:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: train-and-validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL + Train (generate artifacts)
        run: |
          python scripts/run_etl.py
          python scripts/train.py --env local

      - name: Start FastAPI server
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health/live > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        run: python scripts/smoke_test_api.py --base-url http://localhost:8000

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t forecasting-service .

      - name: Verify image exists
        run: docker image inspect forecasting-service > /dev/null 2>&1
